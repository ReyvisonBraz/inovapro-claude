# ============================================================
# INOVA PRO — Cloud Build (Google Cloud Run)
# ============================================================
# Uso:
#   gcloud builds submit --config cloudbuild.yaml
#
# Variáveis de substituição (configurar no Cloud Build ou CLI):
#   _SERVICE_NAME    → inovapro-api
#   _REGION          → us-central1 (ou sao-paulo se disponível)
#   _DATABASE_URL    → postgresql://user:pass@host:5432/postgres
#   _JWT_SECRET      → sua-chave-secreta-jwt
#   _GEMINI_API_KEY  → sua-chave-gemini (opcional)
#   _APP_URL         → https://seu-app.vercel.app
# ============================================================

steps:
  # ─── 1. Build da imagem Docker ───
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source/${_SERVICE_NAME}:latest'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source/${_SERVICE_NAME}:$SHORT_SHA'
      - '.'

  # ─── 2. Push para Artifact Registry ───
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source/${_SERVICE_NAME}:latest'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source/${_SERVICE_NAME}:$SHORT_SHA'

  # ─── 3. Deploy no Cloud Run ───
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=PORT=8080'
      - '--set-env-vars=DATABASE_URL=${_DATABASE_URL}'
      - '--set-env-vars=JWT_SECRET=${_JWT_SECRET}'
      - '--set-env-vars=APP_URL=${_APP_URL}'
      - '--update-secrets=GEMINI_API_KEY=gemini-api-key:latest'
      - '--update-secrets=SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest'

timeout: '900s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: 'CLOUD_LOGGING_ONLY'
